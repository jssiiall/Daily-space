<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>碎碎念自留地</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #fff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .header h1 { font-size: 16px; margin: 0; }
        .btn-group button { font-size: 12px; padding: 5px 10px; border-radius: 4px; border: 1px solid #ddd; background: #fff; margin-left: 5px; cursor: pointer; }
        
        #chatContainer { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { background: #fff; padding: 10px 14px; border-radius: 15px; align-self: flex-end; max-width: 85%; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .time { font-size: 10px; color: #aaa; margin-bottom: 3px; display: block; }

        .input-area { background: #fff; padding: 10px; display: flex; gap: 8px; border-top: 1px solid #ddd; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        input { flex: 1; border: 1px solid #ddd; padding: 8px 15px; border-radius: 20px; outline: none; font-size: 16px; }
        button.send { background: #333; color: #fff; border: none; padding: 0 15px; border-radius: 20px; }

        @media print {
            .header, .input-area { display: none !important; }
            body { background: #fff; }
            .message { border-bottom: 1px solid #eee; width: 100%; align-self: flex-start; box-shadow: none; border-radius: 0; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>我的自留地</h1>
        <div class="btn-group">
            <button onclick="undoLast()" style="color: #888;">撤回</button>
            <button onclick="exportData()">导出</button>
            <button onclick="clearAll()" style="color: #ff4d4f;">清空</button>
        </div>
    </div>
    <div id="chatContainer"></div>
    <div class="input-area">
        <input type="text" id="msgIn" placeholder="此刻想说什么..." autocomplete="off">
        <button class="send" onclick="send()">发送</button>
    </div>

    <script>
        const container = document.getElementById('chatContainer');
        const input = document.getElementById('msgIn');

        window.onload = () => {
            const history = JSON.parse(localStorage.getItem('my_chat_logs') || '[]');
            refreshDisplay(history);
        };

        function send() {
            const text = input.value.trim();
            if(!text) return;
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            const history = JSON.parse(localStorage.getItem('my_chat_logs') || '[]');
            history.push({text, time});
            localStorage.setItem('my_chat_logs', JSON.stringify(history));
            
            input.value = '';
            refreshDisplay(history);
        }

        function refreshDisplay(history) {
            container.innerHTML = '';
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'message';
                div.innerHTML = `<span class="time">${item.time}</span>${item.text}`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function undoLast() {
            const history = JSON.parse(localStorage.getItem('my_chat_logs') || '[]');
            if (history.length === 0) return;
            if(confirm('确定撤回上一条消息吗？')) {
                history.pop();
                localStorage.setItem('my_chat_logs', JSON.stringify(history));
                refreshDisplay(history);
            }
        }

        function exportData() { window.print(); }

        function clearAll() {
            if(confirm('确定要清空今天的对话记录吗？')) {
                localStorage.removeItem('my_chat_logs');
                refreshDisplay([]);
            }
        }

        input.onkeypress = (e) => { if(e.key === 'Enter') send(); };
    </script>
</body>
</html>
